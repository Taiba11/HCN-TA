# HCN-TA: Default Configuration
model:
  name: "HCN-TA"
  backbone:
    name: "resnet50"
    pretrained: true
    freeze_layers: 0
  hierarchical_capsule:
    lower_capsules:
      num_capsules: 8
      capsule_dim: 32
      kernel_size: 9
      stride: 2
    higher_capsules:
      num_capsules: 2
      capsule_dim: 16
      routing_iterations: 3
  temporal_attention:
    num_resolutions: 3
    hidden_dim: 256
    dropout: 0.1
    locality_awareness: true

audio:
  sample_rate: 16000
  duration: 4.0
  noise_reduction: true

mel_spectrogram:
  n_fft: 2048
  hop_length: 512
  n_mels: 128
  image_size: [224, 224]

training:
  epochs: 100
  batch_size: 32
  optimizer:
    name: "adam"
    lr: 0.0001
    weight_decay: 0.00001
  scheduler:
    name: "cosine"
    T_max: 100
  loss:
    name: "margin"
    m_plus: 0.9
    m_minus: 0.1
    lambda_val: 0.5
  early_stopping:
    patience: 15

data:
  num_workers: 4
  pin_memory: true

seed: 42
device: "cuda"
